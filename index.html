/* -------------------------------------------------
   3️⃣ DIGITAL CLOCK
   ------------------------------------------------- */
function renderClock(){
    const el = document.getElementById('timer');
    if (!el) return;
    const lang = document.documentElement.lang || 'en';
    const label = translations[lang].timerLabel;
    const now = new Date();
    let h = now.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    el.textContent = `${label} ${h}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} ${ampm}`;
}

/* -------------------------------------------------
   4️⃣ LANGUAGE SWITCHER
   ------------------------------------------------- */
function setLanguage(lang){
    const dict = translations[lang];
    if (!dict) return;
    // replace every element that has a data‑i18n attribute
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (dict[key]) el.innerHTML = dict[key];
    });
    document.documentElement.lang = lang;
    // highlight the active button
    document.querySelectorAll('.lang-switcher button')
            .forEach(btn=> btn.classList.toggle('active', btn.dataset.lang===lang));
    // remember the choice for the next visit
    localStorage.setItem('lang', lang);
    renderClock();                 // also updates the clock label
}

/* -------------------------------------------------
   5️⃣ INITIALISE – runs after the whole page is parsed
   ------------------------------------------------- */
document.addEventListener('DOMContentLoaded', () => {
    // 1️⃣ random story picture
    randomizeImage();

    // 2️⃣ language (load from localStorage or default to English)
    setLanguage(localStorage.getItem('lang') || 'en');

    // 3️⃣ click‑handlers for the language buttons
    document.querySelectorAll('.lang-switcher button')
            .forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));

    // 4️⃣ start the ticking clock
    setInterval(renderClock, 1000);
    renderClock();   // first immediate draw
});
</script>
